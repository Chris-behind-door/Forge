name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bundle 7-Zip for CHM extraction
        shell: pwsh
        run: |
          choco install 7zip -y
          mkdir -Force backend/bundled_tools
          Copy-Item 'C:\Program Files\7-Zip\7z.exe' backend/bundled_tools/
          Copy-Item 'C:\Program Files\7-Zip\7z.dll' backend/bundled_tools/

      - name: Install backend dependencies
        working-directory: backend
        shell: pwsh
        run: |
          pip install uv
          uv venv
          .\.venv\Scripts\activate
          uv pip install -e ".[dev]"
          # Install CPU-only PyTorch (much smaller than CUDA version)
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install pyinstaller

      - name: Pre-download embedding model
        working-directory: backend
        shell: pwsh
        run: |
          .\.venv\Scripts\activate
          python -c "
          import os, zipfile
          os.environ['HF_ENDPOINT'] = 'https://hf-mirror.com'
          from pathlib import Path
          from huggingface_hub import snapshot_download

          cache_dir = Path('model-cache')
          cache_dir.mkdir(parents=True, exist_ok=True)
          snapshot_download('Qdrant/bge-small-zh-v1.5', cache_dir=str(cache_dir))

          model_dir = cache_dir / 'models--Qdrant--bge-small-zh-v1.5'
          with zipfile.ZipFile('embedding-model.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
              for f in sorted(model_dir.rglob('*')):
                  if f.is_file():
                      zf.write(f, f.relative_to(cache_dir))
          sz = os.path.getsize('embedding-model.zip') / 1024 / 1024
          print(f'Created embedding-model.zip ({sz:.0f} MB)')
          "

      - name: Pre-download reranker model (ONNX)
        working-directory: backend
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          python -c "
          import os, zipfile
          from pathlib import Path
          from huggingface_hub import hf_hub_download

          out = Path('reranker-onnx')
          out.mkdir(parents=True, exist_ok=True)

          os.environ['HF_ENDPOINT'] = 'https://hf-mirror.com'

          # Download model_quantized.onnx from onnx/ subdir, tokenizer from root
          files = [
              ('onnx/model_quantized.onnx', 'model_quantized.onnx'),
              ('tokenizer.json', 'tokenizer.json'),
          ]
          for remote_path, local_name in files:
              path = hf_hub_download(
                  repo_id='onnx-community/bge-reranker-v2-m3-ONNX',
                  filename=remote_path,
                  local_dir=str(out),
              )
              print(f'Downloaded {remote_path} -> {local_name}')

          # Rename model_quantized.onnx from onnx/ to root
          if Path(str(out) + '/onnx/model_quantized.onnx').exists():
              import shutil
              shutil.move(str(out) + '/onnx/model_quantized.onnx', str(out) + '/model_quantized.onnx')
              Path(str(out) + '/onnx').rmdir()

          with zipfile.ZipFile('reranker-model.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
              for f in sorted(out.rglob('*')):
                  if f.is_file():
                      zf.write(f, f.relative_to(out))
          sz = Path('reranker-model.zip').stat().st_size / 1024 / 1024
          print(f'Created reranker-model.zip ({sz:.0f} MB)')
          "

      - name: Package backend with PyInstaller (onedir)
        working-directory: backend
        shell: pwsh
        run: |
          .\.venv\Scripts\activate
          pyinstaller build.spec

          $totalMB = [math]::Round((Get-ChildItem dist\backend\ -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB)
          Write-Host "Backend onedir: $totalMB MB"

      - name: Stage backend for Tauri bundle
        shell: pwsh
        run: |
          # Copy backend onedir output to src-tauri/backend-bundle/
          # Tauri will include this as resources in the installer
          Remove-Item -Recurse -Force src-tauri/backend-bundle -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path src-tauri/backend-bundle
          Copy-Item -Recurse backend\dist\backend\* src-tauri\backend-bundle\
          
          # Copy model zips into backend-bundle so they get bundled too
          Copy-Item backend\embedding-model.zip src-tauri\backend-bundle\
          Copy-Item backend\reranker-model.zip src-tauri\backend-bundle\
          
          $totalMB = [math]::Round((Get-ChildItem src-tauri\backend-bundle\ -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB)
          Write-Host "Staged backend-bundle: $totalMB MB"
          Get-ChildItem src-tauri\backend-bundle\ | ForEach-Object { Write-Host "  $($_.Name) ($([math]::Round($_.Length/1MB)) MB)" }

      - name: Install frontend dependencies
        run: |
          npm install
          npm install --prefix frontend

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Tauri app (with bundled backend)
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npx tauri
          tagName: v__VERSION__
          releaseName: Engineering Assistant v__VERSION__
          releaseBody: |
            Windows build (auto)
          releaseDraft: true
          prerelease: false

      - name: Upload model assets to release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tauriConf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tag = "v$($tauriConf.version)"
          Write-Host "Tag: $tag"

          gh release upload $tag backend/embedding-model.zip backend/reranker-model.zip --clobber
          Write-Host "Done"
