name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bundle 7-Zip for CHM extraction
        shell: pwsh
        run: |
          choco install 7zip -y
          mkdir -Force backend/bundled_tools
          Copy-Item 'C:\Program Files\7-Zip\7z.exe' backend/bundled_tools/
          Copy-Item 'C:\Program Files\7-Zip\7z.dll' backend/bundled_tools/

      - name: Install backend dependencies
        working-directory: backend
        shell: pwsh
        run: |
          pip install uv
          uv venv
          .\.venv\Scripts\activate
          uv pip install -e ".[dev]"
          uv pip install pyinstaller

      - name: Pre-download embedding model
        working-directory: backend
        shell: pwsh
        run: |
          .\.venv\Scripts\activate
          python -c "
          import os, zipfile
          os.environ['HF_ENDPOINT'] = 'https://hf-mirror.com'
          from pathlib import Path
          from huggingface_hub import snapshot_download

          cache_dir = Path('model-cache')
          cache_dir.mkdir(parents=True, exist_ok=True)
          snapshot_download('Qdrant/bge-small-zh-v1.5', cache_dir=str(cache_dir))

          model_dir = cache_dir / 'models--Qdrant--bge-small-zh-v1.5'
          with zipfile.ZipFile('embedding-model.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
              for f in sorted(model_dir.rglob('*')):
                  if f.is_file():
                      zf.write(f, f.relative_to(cache_dir))
          sz = os.path.getsize('embedding-model.zip') / 1024 / 1024
          print(f'Created embedding-model.zip ({sz:.0f} MB)')
          "

      - name: Pre-download reranker model
        working-directory: backend
        shell: pwsh
        run: |
          .\.venv\Scripts\activate
          $env:HF_ENDPOINT = 'https://hf-mirror.com'
          python -c "
          from pathlib import Path
          from huggingface_hub import snapshot_download
          out = Path('reranker-snapshot')
          out.mkdir(parents=True, exist_ok=True)
          snapshot_download('BAAI/bge-reranker-v2-m3', local_dir=str(out))
          "

          .\.venv\Scripts\activate
          python -c "
          import zipfile
          from pathlib import Path
          snap = Path('reranker-snapshot')
          with zipfile.ZipFile('reranker-model.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
              for f in sorted(snap.rglob('*')):
                  if f.is_file():
                      zf.write(f, f.relative_to(snap))
          sz = Path('reranker-model.zip').stat().st_size / 1024 / 1024
          print(f'Created {sz:.0f} MB')
          "

      - name: Package backend with PyInstaller (onedir)
        working-directory: backend
        shell: pwsh
        run: |
          .\.venv\Scripts\activate
          pyinstaller --onedir --name backend --console `
            --paths src `
            --collect-all lancedb `
            --collect-all fastembed `
            --collect-all rapidocr_onnxruntime `
            --collect-all fitz `
            --collect-all pymupdf `
            --collect-all langchain_text_splitters `
            --collect-all llama_index `
            --collect-all llama_index_workflows `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import src `
            --hidden-import src.main `
            --hidden-import src.routers `
            --hidden-import src.routers.config `
            --hidden-import src.routers.documents `
            --hidden-import src.routers.sessions `
            --hidden-import src.llm `
            --hidden-import src.llm.agent `
            --hidden-import src.llm.client `
            --hidden-import src.llm.prompts `
            --hidden-import src.llm.tools `
            --hidden-import src.llm.workflow `
            --hidden-import src.rag `
            --hidden-import src.rag.embeddings `
            --hidden-import src.rag.reranker `
            --hidden-import src.rag.bundled_models `
            --hidden-import src.rag.vector_store `
            --hidden-import src.parsers `
            --hidden-import src.parsers.pdf `
            --hidden-import src.parsers.chm `
            --hidden-import src.models `
            --hidden-import src.models.session `
            --hidden-import src.utils `
            --hidden-import src.utils.paths `
            --hidden-import src.utils.llm_config `
            --hidden-import bs4 `
            --hidden-import numpy `
            --hidden-import keyring `
            --hidden-import httpx `
            --hidden-import dotenv `
            --hidden-import pydantic `
            --hidden-import llama_index.core.workflow `
            --hidden-import langchain_text_splitters `
            --add-data "bundled_tools;bundled_tools" `
            run.py

          $totalMB = [math]::Round((Get-ChildItem dist\backend\ -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB)
          Write-Host "Backend onedir: $totalMB MB"

      - name: Stage backend for Tauri bundle
        shell: pwsh
        run: |
          # Copy backend onedir output to src-tauri/backend-bundle/
          # Tauri will include this as resources in the installer
          Remove-Item -Recurse -Force src-tauri/backend-bundle -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path src-tauri/backend-bundle
          Copy-Item -Recurse backend\dist\backend\* src-tauri\backend-bundle\
          
          $totalMB = [math]::Round((Get-ChildItem src-tauri\backend-bundle\ -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB)
          Write-Host "Staged backend-bundle: $totalMB MB"
          Get-ChildItem src-tauri\backend-bundle\ | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Install frontend dependencies
        run: |
          npm install
          npm install --prefix frontend

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Tauri app (with bundled backend)
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npx tauri
          tagName: v__VERSION__
          releaseName: Engineering Assistant v__VERSION__
          releaseBody: |
            Windows build (auto)
          releaseDraft: true
          prerelease: false

      - name: Upload model assets to release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tauriConf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tag = "v$($tauriConf.version)"
          Write-Host "Tag: $tag"

          gh release upload $tag backend/embedding-model.zip backend/reranker-model.zip --clobber
          Write-Host "Done"
