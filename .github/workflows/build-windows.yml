name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install uv
          uv venv
          .\.venv\Scripts\activate
          uv pip install -e ".[dev]"
          uv pip install pyinstaller

      - name: Build backend sidecar with PyInstaller
        working-directory: backend
        run: |
          .\.venv\Scripts\activate
          pyinstaller --onefile --name backend --console `
            --collect-all lancedb `
            --collect-all fastembed `
            --collect-all rapidocr_onnxruntime `
            --collect-all fitz `
            --collect-all pymupdf `
            --collect-all langchain_text_splitters `
            --collect-all llama_index `
            --collect-all llama_index_workflows `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            src/main.py
          New-Item -ItemType Directory -Force -Path ..\src-tauri\binaries
          Copy-Item dist\backend.exe ..\src-tauri\binaries\backend-x86_64-pc-windows-msvc.exe

      - name: Install npm dependencies
        run: |
          npm install
          cd frontend
          npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npx tauri

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
