name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python sidecar
        working-directory: backend
        shell: pwsh
        run: |
          pip install uv
          uv venv
          .\.venv\Scripts\activate
          uv pip install -e ".[dev]"
          uv pip install pyinstaller

      - name: Pre-download embedding model
        working-directory: backend
        shell: pwsh
        run: |
          .\.venv\Scripts\activate
          python -c "
          import os
          os.environ['HF_ENDPOINT'] = 'https://hf-mirror.com'
          from pathlib import Path
          cache_dir = Path('model-cache')
          cache_dir.mkdir(parents=True, exist_ok=True)
          from fastembed import TextEmbedding
          print('Downloading embedding model...')
          model = TextEmbedding('BAAI/bge-small-zh-v1.5', cache_dir=str(cache_dir))
          list(model.embed(['test']))
          print('Model downloaded successfully')
          "

          Compress-Archive -Path model-cache\* -DestinationPath embedding-model.zip
          Write-Host "Model archive created"

      - name: Pre-download reranker model
        working-directory: backend
        shell: pwsh
        run: |
          .\.venv\Scripts\activate
          $env:HF_ENDPOINT = 'https://hf-mirror.com'
          python -c "
          from pathlib import Path
          from huggingface_hub import snapshot_download
          cache_dir = Path('reranker-cache')
          cache_dir.mkdir(parents=True, exist_ok=True)
          print('Downloading reranker model...')
          path = snapshot_download(
              'BAAI/bge-reranker-v2-m3',
              cache_dir=str(cache_dir),
          )
          print(f'Downloaded to {path}')
          "

          .\.venv\Scripts\activate
          python -c "
          import zipfile
          from pathlib import Path
          print('Creating reranker-model.zip ...')
          cache = Path('reranker-cache')
          with zipfile.ZipFile('reranker-model.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
              for f in sorted(cache.rglob('*')):
                  if f.is_file():
                      zf.write(f, f.relative_to(cache))
          print(f'Created {Path("reranker-model.zip").stat().st_size / 1024 / 1024:.0f} MB')
          "

      - name: Package with PyInstaller
        working-directory: backend
        shell: pwsh
        run: |
          .\.venv\Scripts\activate

          pyinstaller --onefile --name backend --console `
            --paths src `
            --collect-all lancedb `
            --collect-all fastembed `
            --collect-all rapidocr_onnxruntime `
            --collect-all fitz `
            --collect-all pymupdf `
            --collect-all langchain_text_splitters `
            --collect-all llama_index `
            --collect-all llama_index_workflows `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import src `
            --hidden-import src.main `
            --hidden-import src.routers `
            --hidden-import src.routers.config `
            --hidden-import src.routers.documents `
            --hidden-import src.routers.sessions `
            --hidden-import src.llm `
            --hidden-import src.llm.agent `
            --hidden-import src.llm.client `
            --hidden-import src.llm.prompts `
            --hidden-import src.llm.tools `
            --hidden-import src.llm.workflow `
            --hidden-import src.rag `
            --hidden-import src.rag.embeddings `
            --hidden-import src.rag.reranker `
            --hidden-import src.rag.bundled_models `
            --hidden-import src.rag.vector_store `
            --hidden-import src.parsers `
            --hidden-import src.parsers.pdf `
            --hidden-import src.parsers.chm `
            --hidden-import src.models `
            --hidden-import src.models.session `
            --hidden-import src.utils `
            --hidden-import src.utils.paths `
            --hidden-import src.utils.llm_config `
            --hidden-import bs4 `
            --hidden-import numpy `
            --hidden-import keyring `
            --hidden-import httpx `
            --hidden-import dotenv `
            --hidden-import pydantic `
            --hidden-import llama_index.core.workflow `
            --hidden-import langchain_text_splitters `
            run.py

          New-Item -ItemType Directory -Force -Path ..\src-tauri\binaries
          Copy-Item dist\backend.exe ..\src-tauri\binaries\backend-x86_64-pc-windows-msvc.exe

      - name: Install frontend dependencies
        run: |
          npm install
          npm install --prefix frontend

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npx tauri

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            backend/embedding-model.zip
            backend/reranker-model.zip
